# Free hosting on Render (connect this GitHub repo in the Render dashboard).
# Docs: https://render.com/docs/deploy-php-laravel-docker

databases:
  - name: olys-bazar-db
    plan: free
    databaseName: olys_bazar
    user: olys_bazar

services:
  - type: web
    name: olys-bazar
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: olys-bazar-db
          property: connectionString
      - key: DB_CONNECTION
        value: pgsql
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_CHANNEL
        value: stderr
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: STRIPE_KEY
        sync: false
      - key: STRIPE_SECRET
        sync: false
