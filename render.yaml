# Blueprint: Mukamghor
# Reuses the existing free-tier database (olys-bazar-db).
# Render allows only ONE free database per account.
# Docs: https://render.com/docs/deploy-php-laravel-docker

databases:
  - name: olys-bazar-db
    plan: free
    databaseName: olys_bazar
    user: olys_bazar

services:
  - type: web
    name: mukamghor
    runtime: docker
    plan: free
    envVars:
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: olys-bazar-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: olys-bazar-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: olys-bazar-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: olys-bazar-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: olys-bazar-db
          property: password
      - key: DB_SSLMODE
        value: require
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_CHANNEL
        value: stderr
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://mukamghor.onrender.com
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_DRIVER
        value: file
      - key: STRIPE_KEY
        sync: false
      - key: STRIPE_SECRET
        sync: false
